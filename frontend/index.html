<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>J.A.R.V.I.S</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/desktop.css">
<link rel="stylesheet" media="screen and (max-width:768px)"
      href="css/mobile.css">
</head>

<body>

<div class="jarvis-app">

    <!-- Background -->
    <div class="bg-image"></div>

    <!-- Header -->
    <header class="topbar">

        <div class="brand">
            J.A.R.V.I.S
        </div>



        <div class="connection idle" id="status-indicator">
            <span class="dot"></span>
            <span id="status-text">Disconnected</span>
        </div>

    </header>

    <!-- Desktop Layout -->
    <main class="dashboard">

        <!-- Left -->
        <section class="left-panel">

            <div class="system-card">
                <h4>System Time</h4>
                <p id="clock-widget">--:--:--</p>
            </div>

            <div class="system-card">
                <h4>System Load</h4>
                <p id="cpu-value">--%</p>
                <div class="progress-bar"><div class="progress-fill" id="cpu-progress"></div></div>
            </div>

            <div class="system-card">
                <h4>Core Temp</h4>
                <p id="temp-value">--°C</p>
                <div class="progress-bar"><div class="progress-fill" id="temp-progress"></div></div>
            </div>

        </section>

        <!-- Center -->
        <section class="center-panel">
            <div class="wave-container" id="golden-wave">
                <img src="img/wave.gif" class="wave-gif" alt="Jarvis Neural Wave">
            </div>
        </section>

        <!-- Right -->
        <section class="message-panel">

            <div class="message-box" id="conversation-preview">
            </div>

        </section>

    </main>

</div>

<!-- Script is handled by app.js -->

<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<script src="app.js"></script>

</body>
</html>
